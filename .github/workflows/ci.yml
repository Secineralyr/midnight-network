name: CI

on:
  pull_request:
    branches: [main, staging, develop]
  push:
    branches: [main, staging, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & Format check
        run: pnpm check

      - name: Copy .dev.vars.template to .dev.vars (required for wrangler types)
        run: cp packages/backend/.dev.vars.template packages/backend/.dev.vars

      - name: Apply local D1 migrations (required for Prisma type generation)
        run: pnpm --filter @midnight-network/backend migrate:local

      - name: Build packages
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
