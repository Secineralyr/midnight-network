name = "midnight-network-backend"
main = "src/index.ts"
compatibility_date = "2025-11-17"
compatibility_flags = ["nodejs_compat"]
routes = [
	{ pattern = "<host>/api/*", zone_name = "<host>" },
	{ pattern = "<host>/webhook", zone_name = "<host>" },
]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[triggers]
crons = ["1 15 * * *", "59 14 * * *"]

[[kv_namespaces]]
binding = "SESSION"
id = "REPLACE_ME"

[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_ME"

[[r2_buckets]]
binding = "RANK_STATUS_SNAPSHOTS"
bucket_name = "replace-me"

[[d1_databases]]
binding = "DB"
database_name = "midnight-network"
database_id = "REPLACE_ME"
migrations_dir = "./prisma/migrations"

[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "301"
simple = { limit = 100, period = 60 }

[vars]
ENVIRONMENT = "production"
GAME_JOIN_POST_TEXT_REGEX = ""
TARGET_MATCH_HOUR = 15
TARGET_MATCH_MINUTES = 0
POST_MATCH_RESULT_TITLE = ""
POST_MATCH_RESULT_URL = "https://{host}/"
POST_MATCH_RESULT_TEMPLATE = "{title}\n\n{ranks}\n\n有効記録数：{valid}\nフライング記録数：{flying}\n\n{url}"
DISABLE_POST_MATCH_RESULT = false
POST_MATCH_REMIND_TEXT = ""
DISABLE_WEBHOOK_BEFORE_TARGET_MATCH = 60000
DISABLE_WEBHOOK_AFTER_TARGET_MATCH = 60000
VAPID_PUBLIC_KEY = ""

[vars.crons]
CRON_DAILY = "1 15 * * *"
CRON_DAILY_REMIND = "59 14 * * *"

[dev]
host = "localhost"
ip = "0.0.0.0"
port = 8787
local_protocol = "http"
