<!doctype html>
<html lang="ja">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
		<meta name="theme-color" content="#1c1724" />
		<meta
			name="description"
			content="Daily post time competition statistics tool"
		/>
		<link rel="icon" href="/favicon.png" type="image/png" sizes="48x49" />
		<link rel="apple-touch-icon" href="/logo-192.png" />
		<link rel="apple-touch-icon" sizes="192x192" href="/logo-192.png">
		<link rel="apple-touch-icon" sizes="512x512" href="/logo-512.png">
		<!-- OGP -->
		<meta property="og:title" content="MidNight Network" />
		<meta
			property="og:description"
			content="Daily post time competition statistics tool"
		/>
		<meta property="og:type" content="website" />
		<meta property="og:image" content="/logo-512.png" />
		<meta property="og:site_name" content="MidNight Network" />
		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="MidNight Network" />
		<meta
			name="twitter:description"
			content="Daily post time competition statistics tool"
		/>
		<meta name="twitter:image" content="/logo-512.png" />
		<link rel="apple-touch-icon" href="/logo-192.png" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link
			href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=M+PLUS+2:wght@400;500;600;700&family=Michroma&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
